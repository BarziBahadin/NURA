services:
  nura-api:
    build: ./api
    container_name: nura-api
    ports:
      - "8080:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./ingestion/handbook:/app/handbook
      - ./ingestion:/app/ingestion
      - ./.manafest:/app/manafest
      - ./models:/app/ml_models
      - ./frontend:/app/frontend
      - ./uploads:/app/uploads
    networks:
      - nura_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nura-worker:
    build: ./api
    container_name: nura-worker
    command: ["python", "-m", "workers.job_worker"]
    env_file: .env
    environment:
      JOB_WORKER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./ingestion/handbook:/app/handbook
      - ./ingestion:/app/ingestion
      - ./.manafest:/app/manafest
      - ./models:/app/ml_models
      - ./frontend:/app/frontend
    networks:
      - nura_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis, os; r=redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379'))); raise SystemExit(0 if r.exists('health:job_worker:standalone-worker') else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - workers
    restart: unless-stopped

  nura-telegram:
    build: ./api
    container_name: nura-telegram
    command: ["python", "-m", "workers.telegram_worker"]
    env_file: .env
    environment:
      TELEGRAM_POLLER_ENABLED: "true"
      JOB_WORKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./ingestion/handbook:/app/handbook
      - ./ingestion:/app/ingestion
      - ./.manafest:/app/manafest
      - ./models:/app/ml_models
      - ./frontend:/app/frontend
    networks:
      - nura_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis, os; r=redis.Redis(host=os.environ.get('REDIS_HOST','redis'), port=int(os.environ.get('REDIS_PORT','6379'))); raise SystemExit(0 if r.exists('health:telegram_worker') else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - telegram
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:1.0.0
    container_name: nura-chromadb
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - nura_chroma_data:/chroma/chroma
    networks:
      - nura_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: nura-postgres
    environment:
      POSTGRES_DB: nura_db
      POSTGRES_USER: nura_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - nura_postgres_data:/var/lib/postgresql/data
      - ./api/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nura_user -d nura_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nura_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nura-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nura_network
    restart: unless-stopped

  nura-admin:
    build:
      context: ./admin
      args:
        VITE_NURA_API_BASE: /v1
    container_name: nura-admin
    ports:
      - "3004:80"
    networks:
      - nura_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  nura_network:
    driver: bridge

volumes:
  nura_postgres_data:
  nura_chroma_data:
