<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NURA Chat Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* ── Floating button ── */
    #chat-toggle {
      position: fixed;
      bottom: 28px;
      left: 28px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ea580c, #f97316);
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(234,88,12,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 1000;
    }
    #chat-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(234,88,12,0.55); }

    #badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ef476f;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    /* ── Chat window (centered) ── */
    #chat-window {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 420px;
      max-height: 680px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform: translate(-50%, -50%) scale(0.85);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
    }
    #chat-window.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #ea580c, #f97316);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .header-info { flex: 1; }
    .header-info h3 { color: #fff; font-size: 15px; font-weight: 700; }
    .header-info span { color: rgba(255,255,255,0.8); font-size: 12px; }
    .online-dot {
      width: 8px; height: 8px;
      background: #06d6a0;
      border-radius: 50%;
      display: inline-block;
      margin: 0 3px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Language toggle */
    #lang-toggle {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.35);
      flex-shrink: 0;
    }
    .lang-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .lang-btn.active { background: rgba(255,255,255,0.9); color: #ea580c; border-radius: 18px; }
    .lang-btn:hover:not(.active) { color: #fff; }

    #close-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px;
    }
    #close-btn:hover { color: #fff; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-start; }
    .msg.bot   { align-self: flex-end; }
    .msg.agent { align-self: flex-end; }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      unicode-bidi: plaintext;
    }
    .msg.user .bubble  { background: #f0f2f5; color: #1a1a2e; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble  { background: linear-gradient(135deg, #ea580c, #f97316); color: #fff; border-bottom-left-radius: 4px; }
    .msg.agent .bubble { background: linear-gradient(135deg, #1a7a4a, #06d6a0); color: #fff; border-bottom-left-radius: 4px; }

    /* Follow-up bubble */
    .msg.bot .followup-bubble {
      margin-top: 5px;
      padding: 8px 13px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      font-size: 13px;
      background: rgba(234, 88, 12, 0.08);
      color: #ea580c;
      border: 1.5px solid rgba(249, 115, 22, 0.35);
      animation: fadeUp 0.2s ease;
    }
    .followup-btns { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-start; }
    .followup-btn {
      background: #fff;
      border: 1.5px solid #f97316;
      color: #ea580c;
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .followup-btn:hover { background: #f97316; color: #fff; }
    .followup-btn.no { border-color: #ccc; color: #888; }
    .followup-btn.no:hover { background: #f0f2f5; color: #555; }

    /* Meta */
    .meta {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.user  .meta { align-self: flex-start; }
    .msg.bot   .meta { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent .meta { align-self: flex-end; flex-direction: row-reverse; }

    .source-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .source-tag.local  { background: #d4f7e8; color: #1a7a4a; }
    .source-tag.openai { background: #e8d4f7; color: #6b1a99; }
    .source-tag.low    { background: #ffecd4; color: #b45309; }
    .source-doc-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 9.5px; color: #888; margin-top: 2px;
      background: #f5f5f5; border: 1px solid #e5e5e5;
      border-radius: 8px; padding: 1px 7px;
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Typing */
    #typing {
      display: none;
      align-self: flex-end;
      padding: 10px 14px;
      background: linear-gradient(135deg, #ea580c, #f97316);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      animation: fadeUp 0.2s ease;
      margin: 0 16px 0;
    }
    #typing span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    #typing span:nth-child(2) { animation-delay: 0.2s; }
    #typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Tree navigation panel ── */
    #tree-panel {
      border-top: 1px solid #f0f2f5;
      padding: 10px 14px;
      flex-shrink: 0;
      background: #fafafa;
      max-height: 200px;
      overflow-y: auto;
    }
    #tree-panel::-webkit-scrollbar { width: 3px; }
    #tree-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .tree-nav-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .tree-crumb {
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-nav-btn {
      background: #fff7ed;
      border: 1.5px solid #f97316;
      color: #ea580c;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .tree-nav-btn:hover { background: #f97316; color: #fff; }
    .tree-nav-btn.home {
      background: none;
      border-color: #ddd;
      color: #999;
    }
    .tree-nav-btn.home:hover { background: #f0f2f5; color: #555; border-color: #bbb; }

    .tree-level-q {
      font-size: 11.5px;
      color: #555;
      font-weight: 600;
      margin-bottom: 7px;
    }

    .tree-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tree-opt {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      color: #333;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tree-opt:hover {
      background: #fff7ed;
      border-color: #f97316;
      color: #ea580c;
    }
    .tree-opt.has-children::after {
      content: ' ›';
      font-size: 13px;
      opacity: 0.6;
    }

    .agent-bypass-btn {
      margin-top: 12px;
      width: 100%;
      padding: 9px 14px;
      background: none;
      border: 1.5px dashed #f97316;
      border-radius: 10px;
      color: #ea580c;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .agent-bypass-btn:hover { background: #fff7ed; }

    /* Input */
    .chat-footer {
      border-top: 1px solid #f0f2f5;
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #fff;
    }
    #msg-input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 22px;
      padding: 9px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: #f97316; }
    #msg-input::placeholder { color: #bbb; }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ea580c, #f97316);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    #send-btn:hover { transform: scale(1.08); }
    #send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Feedback */
    .feedback-btns { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
    .fb-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      color: #bbb;
      line-height: 1;
      padding: 0;
    }
    .fb-btn.good:hover  { border-color: #06d6a0; color: #06d6a0; }
    .fb-btn.bad:hover   { border-color: #ef476f; color: #ef476f; }
    .fb-btn.sel-good    { border-color: #06d6a0; color: #06d6a0; background: rgba(6,214,160,0.1); }
    .fb-btn.sel-bad     { border-color: #ef476f; color: #ef476f; background: rgba(239,71,111,0.1); }
    .fb-btn:disabled    { opacity: 0.45; cursor: default; }

    /* Escalation banner */
    .escalation-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 12.5px;
      color: #856404;
      text-align: center;
      animation: fadeUp 0.2s ease;
    }

    /* Error bubble */
    .error-bubble {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      align-self: flex-end;
    }

    /* Satisfaction rating */
    .rating-prompt {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      font-size: 13px;
      color: #555;
      animation: fadeUp 0.2s ease;
    }
    .rating-stars { display: flex; justify-content: center; gap: 4px; margin-top: 7px; }
    .star-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s, transform 0.1s;
      line-height: 1;
      padding: 0 2px;
    }
    .star-btn:hover { color: #f97316; transform: scale(1.15); }
    .star-btn.lit   { color: #f97316; }

    @media (max-width: 460px) {
      #chat-window { width: calc(100vw - 24px); max-height: 90vh; }
    }
  </style>
</head>
<body>

<!-- Floating toggle button -->

</button>

<!-- Chat window -->

    <button id="close-btn" aria-label="إغلاق">✕</button>
  </div>

  <div id="messages"></div>

  <div id="typing">
    <span></span><span></span><span></span>
  </div>

  <!-- Guided topic tree navigation panel -->
  <div id="tree-panel"></div>

  <div class="chat-footer">
    <button id="send-btn" aria-label="إرسال" disabled>

    <textarea id="msg-input" rows="1" placeholder="اكتب رسالتك هنا…" maxlength="500"></textarea>

</div>

  // ── State ─────────────────────────────────────────────────────────────────
  let currentLang        = 'ar';
  let sessionId          = null;
  let sessionToken       = null;
  let customerId         = 'widget-' + Math.random().toString(36).substr(2, 8);
  let isOpen             = false;
  let welcomed           = false;
  let isEscalated        = false;
  let isSessionClosed      = false;
  let agentEventSource     = null;
  let escalationBannerEl   = null;
  let treeStack            = [];
  let typingDebounceTimer  = null;

  // ── DOM ───────────────────────────────────────────────────────────────────
  const toggle      = document.getElementById('chat-toggle');
  const win         = document.getElementById('chat-window');
  const closeBtn    = document.getElementById('close-btn');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const messagesEl  = document.getElementById('messages');
  const typingEl    = document.getElementById('typing');
  const badge       = document.getElementById('badge');
  const treePanel   = document.getElementById('tree-panel');
  const headerTitle = document.getElementById('header-title');
  const headerStatus= document.getElementById('header-status');
  const langBtns    = document.querySelectorAll('.lang-btn');

  // ── Tree helpers ──────────────────────────────────────────────────────────
  function treeLabel(node) {
    return node.label[currentLang] || node.label.ar;
  }

  function currentTreeNode() {
    return treeStack.length > 0 ? treeStack[treeStack.length - 1] : TOPIC_TREE;
  }

  async function directToAgent() {
    if (isEscalated) return;
    try {
      const handoffRes = await fetch(`${API_BASE}/handoff/direct`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, customer_id: customerId, channel: 'web', reason: 'direct_request' }),
      });
      if (!handoffRes.ok) throw new Error(`Handoff failed: ${handoffRes.status}`);
      const data = await handoffRes.json();
      sessionId = data.session_id;
      sessionToken = data.session_token || sessionToken;
      isEscalated = true;
      showEscalationBanner();
      startAgentStream();
      renderTree();
    } catch (e) {
      console.warn('directToAgent failed:', e);
    }
  }

  function renderTree() {
    const t    = UI[currentLang];
    const node = currentTreeNode();
    treePanel.innerHTML = '';

    // Back / home buttons (only when navigated below root)
    if (treeStack.length > 0) {
      const navBar = document.createElement('div');
      navBar.className = 'tree-nav-bar';

      const backBtn = document.createElement('button');
      backBtn.className = 'tree-nav-btn';
      backBtn.textContent = t.treeBack;
      backBtn.addEventListener('click', () => {
        track('tree_back', treeLabel(treeStack[treeStack.length - 1]), '');
        treeStack.pop();
        renderTree();
      });
      navBar.appendChild(backBtn);

      if (treeStack.length > 1) {
        const homeBtn = document.createElement('button');
        homeBtn.className = 'tree-nav-btn home';
        homeBtn.textContent = t.treeHome;
        homeBtn.addEventListener('click', () => {
          track('tree_home', '', '');
          treeStack = [];
          renderTree();
        });
        navBar.appendChild(homeBtn);
      }

      // Breadcrumb trail
      const crumb = document.createElement('span');
      crumb.className = 'tree-crumb';
      crumb.textContent = treeStack.map(n => treeLabel(n)).join(' › ');
      navBar.appendChild(crumb);

      treePanel.appendChild(navBar);
    }

    // Current level question
    const q = document.createElement('div');
    q.className = 'tree-level-q';
    q.textContent = treeLabel(node);
    treePanel.appendChild(q);

    // Options for this level
    const optsDiv = document.createElement('div');
    optsDiv.className = 'tree-options';

    (node.children || []).forEach(child => {
      const btn = document.createElement('button');
      btn.className = 'tree-opt' + (child.children ? ' has-children' : '');
      btn.textContent = treeLabel(child);
      btn.addEventListener('click', () => {
        track('tree_click', treeLabel(child), child.id, { topic_id: child.id, article_id: child.article ?? null });
        if (child.article !== undefined) {
          handleLeaf(child);
        } else if (child.children) {
          treeStack.push(child);
          renderTree();
        }
      });
      optsDiv.appendChild(btn);
    });

    treePanel.appendChild(optsDiv);

    if (treeStack.length === 0 && !isEscalated) {
      const agentBtn = document.createElement('button');
      agentBtn.className = 'agent-bypass-btn';
      agentBtn.textContent = UI[currentLang].talkToAgent;
      agentBtn.addEventListener('click', () => {
        track('direct_to_agent', 'bypass_btn', '');
        directToAgent();
      });
      treePanel.appendChild(agentBtn);
    }
  }

  function handleLeaf(node) {
    const dict    = currentLang === 'ku' ? ARTICLES_KU : ARTICLES;
    const content = dict[node.article];
    if (content === undefined) return;

    // Show user's selection as a user bubble
    appendUserMsg(treeLabel(node));
    showTyping();

    setTimeout(() => {
      hideTyping();
      appendBotMsg(content, 0.97, 'rules');
      // Reset tree to root after answering
      treeStack = [];
      renderTree();
    }, 450);
  }

  // ── Language ──────────────────────────────────────────────────────────────
  function applyLang(lang) {
    currentLang = lang;
    const t = UI[lang];

    document.documentElement.setAttribute('lang', t.htmlLang);
    document.documentElement.setAttribute('dir', t.dir);
    win.setAttribute('dir', t.dir);
    msgInput.setAttribute('dir', t.dir);
    msgInput.placeholder = t.placeholder;
    headerTitle.textContent = t.headerTitle;
    headerStatus.innerHTML = t.headerStatus + ' <span class="online-dot"></span>';

    langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    sendBtn.setAttribute('aria-label', t.sendAriaLabel);
    closeBtn.setAttribute('aria-label', t.closeAriaLabel);

    // Re-render tree in new language (reset to root on language switch)
    treeStack = [];
    renderTree();

    if (welcomed) {
      messagesEl.innerHTML = '';
      appendBotMsg(t.welcome, null, null);
    }
  }

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.lang === currentLang) return;
      track('lang_switch', btn.dataset.lang, '');
      applyLang(btn.dataset.lang);
    });
  });

  // ── Open / close ──────────────────────────────────────────────────────────
  function openChat() {
    isOpen = true;
    win.classList.add('open');
    badge.style.display = 'none';
    setTimeout(() => msgInput.focus(), 250);
    if (isEscalated && !isSessionClosed) startAgentStream();
  }
  function closeChat() {
    isOpen = false;
    win.classList.remove('open');
    stopAgentStream();
  }

  toggle.addEventListener('click', () => {
    track(isOpen ? 'chat_close' : 'chat_open', 'toggle_btn', '');
    isOpen ? closeChat() : openChat();
    if (!welcomed && isOpen) {
      welcomed = true;
      badge.style.display = 'none';
      setTimeout(() => appendBotMsg(UI[currentLang].welcome, null, null), 300);
    }
  });
  closeBtn.addEventListener('click', () => { track('chat_close', 'close_btn', ''); closeChat(); });

  // ── Input ──────────────────────────────────────────────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
    sendBtn.disabled = msgInput.value.trim() === '';
    if (isEscalated && !isSessionClosed && sessionId && sessionToken) {
      clearTimeout(typingDebounceTimer);
      typingDebounceTimer = setTimeout(() => {
        fetch(`${API_BASE}/session/${encodeURIComponent(sessionId)}/typing?sender=customer&session_token=${encodeURIComponent(sessionToken)}`,
          { method: 'POST' }).catch(() => {});
      }, 500);
    }
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  function appendUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="meta"><span>${fmtTime()}</span></div>`;
    messagesEl.appendChild(div);
    scrollBottom();

  function appendBotMsg(text, confidence, source, sourceDoc) {
    const t   = UI[currentLang];
    const div = document.createElement('div');
    div.className = 'msg bot';

    const pct   = confidence != null ? Math.round(confidence * 100) + '%' : '';
    const tag   = sourceTag(source);
    const label = sourceLabel(source);

    const hasFollowUp = text.includes(t.followUpMarker);
    const mainText = hasFollowUp
      ? text.substring(0, text.lastIndexOf(t.followUpMarker)).trimEnd()
      : text;

    div.innerHTML = `
      <div class="bubble">${escHtml(mainText)}</div>
      ${sourceDoc ? `<span class="source-doc-chip" title="${escHtml(sourceDoc)}">📄 ${escHtml(sourceDoc)}</span>` : ''}
      <div class="meta">
        ${pct   ? `<span>${pct}</span>` : ''}
        ${label ? `<span class="source-tag ${tag}">${label}</span>` : ''}
        <span>${fmtTime()}</span>
      </div>`;

    if (source) {
      const fbDiv = document.createElement('div');
      fbDiv.className = 'feedback-btns';
      const btnGood = document.createElement('button');
      btnGood.className = 'fb-btn good'; btnGood.textContent = '✓';
      btnGood.title = currentLang === 'ar' ? 'إجابة صحيحة' : 'Bersiv rast e';
      const btnBad  = document.createElement('button');
      btnBad.className  = 'fb-btn bad';  btnBad.textContent  = '✗';
      btnBad.title = currentLang === 'ar' ? 'إجابة خاطئة' : 'Bersiv xelet e';
      btnGood.addEventListener('click', () => { track('feedback_good', source || '', ''); onFeedback(true,  btnGood, btnBad); });
      btnBad.addEventListener('click',  () => { track('feedback_bad',  source || '', ''); onFeedback(false, btnGood, btnBad); });
      fbDiv.appendChild(btnGood);
      fbDiv.appendChild(btnBad);
      div.appendChild(fbDiv);
    }

    messagesEl.appendChild(div);
    scrollBottom();

    if (hasFollowUp) {
      setTimeout(() => {
        const fDiv = document.createElement('div');
        fDiv.className = 'msg bot';
        fDiv.innerHTML = `
          <div class="followup-bubble">
            ${escHtml(t.followUpMarker)}
            <div class="followup-btns">
              <button class="followup-btn yes-btn">${escHtml(t.yesBtn)}</button>
              <button class="followup-btn no no-btn">${escHtml(t.noBtn)}</button>
            </div>
          </div>`;
        fDiv.querySelector('.yes-btn').addEventListener('click', () => {
          track('followup_yes', '', '');
          fDiv.querySelector('.followup-btns').remove();
          appendBotMsg(t.yesReply, null, null);
          msgInput.focus();
        });
        fDiv.querySelector('.no-btn').addEventListener('click', () => {
          track('followup_no', '', '');
          fDiv.querySelector('.followup-btns').remove();
          appendUserMsg(t.noUserText);
          showTyping();
          setTimeout(() => { hideTyping(); appendBotMsg(t.noReply, null, null); }, 800);
        });
        messagesEl.appendChild(fDiv);
        scrollBottom();
      }, 600);
    }
  }

  function showEscalationBanner() {
    escalationBannerEl = document.createElement('div');
    escalationBannerEl.className = 'escalation-banner';
    escalationBannerEl.textContent = UI[currentLang].escalatingBanner;
    messagesEl.appendChild(escalationBannerEl);
    scrollBottom();
  }

  function sourceTag(src) {
    if (src === 'rules' || src === 'local_model') return 'local';
    if (src === 'openai') return 'openai';
    return 'low';
  }
  function sourceLabel(src) {
    if (src === 'rules')       return 'Rules';
    if (src === 'local_model') return 'ML';
    if (src === 'openai')      return 'AI';
    return null;
  }

  function showTyping()  { typingEl.style.display = 'flex'; scrollBottom(); }
  function hideTyping()  { typingEl.style.display = 'none'; }
  function scrollBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }
  function escHtml(str)  {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime() {
    return new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
  }

  // ── SSE streaming (agent messages pushed in real-time) ────────────────────
  function startAgentStream() {
    if (agentEventSource || !sessionId || !sessionToken) return;
    const streamUrl = `${API_BASE}/session/${encodeURIComponent(sessionId)}/stream?session_token=${encodeURIComponent(sessionToken)}`;
    agentEventSource = new EventSource(streamUrl);
    agentEventSource.onmessage = function (e) {
      try { handleStreamEvent(JSON.parse(e.data)); } catch (_) {}
    };
    agentEventSource.onerror = function () {
      agentEventSource.close();
      agentEventSource = null;
      if (!isSessionClosed && isEscalated) setTimeout(startAgentStream, 5000);
    };
  }

  function stopAgentStream() {
    if (agentEventSource) { agentEventSource.close(); agentEventSource = null; }
  }

  let agentTypingTimer = null;

  function handleStreamEvent(event) {
    if (event.type === 'turn') {
      const t = event.turn;
      if (t.role === 'agent' && t.source === 'human') appendAgentMsg(t.message);
    } else if (event.type === 'typing' && event.sender === 'agent') {
      showTyping();
      clearTimeout(agentTypingTimer);
      agentTypingTimer = setTimeout(hideTyping, 3000);
    } else if (event.type === 'status' && event.status === 'RESOLVED' && !isSessionClosed) {
      isSessionClosed = true;
      stopAgentStream();
      const notice = document.createElement('div');
      notice.className = 'escalation-banner';
      notice.textContent = UI[currentLang].sessionClosed;
      messagesEl.appendChild(notice);
      showRatingPrompt();
      scrollBottom();
      msgInput.disabled = true;
      sendBtn.disabled  = true;
    }
  }

  function showRatingPrompt() {
    const t = UI[currentLang];
    const ratingDiv = document.createElement('div');
    ratingDiv.className = 'rating-prompt';
    const p = document.createElement('p');
    p.textContent = t.ratePrompt;
    const starsRow = document.createElement('div');
    starsRow.className = 'rating-stars';
    [1, 2, 3, 4, 5].forEach(score => {
      const btn = document.createElement('button');
      btn.className = 'star-btn';
      btn.textContent = '★';
      btn.addEventListener('mouseenter', () => {
        starsRow.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('lit', i < score));
      });
      btn.addEventListener('mouseleave', () => {
        starsRow.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
      });
      btn.addEventListener('click', () => {
        starsRow.querySelectorAll('.star-btn').forEach((b, i) => { b.classList.toggle('lit', i < score); b.disabled = true; });
        fetch(`${API_BASE}/session/${encodeURIComponent(sessionId)}/rating`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken || '' },
          body: JSON.stringify({ score }),
        }).catch(() => {});
        setTimeout(() => { ratingDiv.innerHTML = `<p>${escHtml(t.rateThanks)}</p>`; }, 300);
      });
      starsRow.appendChild(btn);
    });
    ratingDiv.appendChild(p);
    ratingDiv.appendChild(starsRow);
    messagesEl.appendChild(ratingDiv);
  }

  // ── Send (free-text, goes to API) ─────────────────────────────────────────
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || sendBtn.disabled) return;

    track('send_message', text.substring(0, 100), '');
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendUserMsg(text);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/message`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          session_id: sessionId,
          channel: 'web',
          customer_id: customerId,
          message: text,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      sessionId = data.session_id;
      sessionToken = data.session_token || sessionToken;

      hideTyping();
      if (data.response) appendBotMsg(data.response, data.confidence, data.source, data.source_doc);

      if (data.escalated && !isEscalated) {
        isEscalated = true;
        showEscalationBanner();
        startAgentStream();
      }

    } catch (e) {
      hideTyping();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = `⚠️ ${e.message || UI[currentLang].errorPrefix}`;
      messagesEl.appendChild(errDiv);
      scrollBottom();
    }
  }

  // ── Analytics tracking (fire-and-forget) ─────────────────────────────────
  function track(eventType, label, meta, extra) {
    fetch(`${API_BASE}/analytics/click`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({
        session_id:  sessionId,
        customer_id: customerId,
        event_type:  eventType,
        label:       label || '',
        meta:        meta  || '',
      }, extra || {})),
    }).catch(() => {}); // silent — never block UX
  }

  // ── Feedback ───────────────────────────────────────────────────────────────
  async function onFeedback(isGood, btnGood, btnBad) {
    btnGood.disabled = true;
    btnBad.disabled  = true;
    if (isGood) { btnGood.classList.add('sel-good'); return; }
    btnBad.classList.add('sel-bad');

    if (!sessionId || isEscalated) return;
    try {
      await fetch(`${API_BASE}/handoff/${sessionId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Session-Token': sessionToken || '',
        },
        body: JSON.stringify({ reason: 'bad_feedback' }),
      });
      isEscalated = true;
      showEscalationBanner();
      startAgentStream();
    } catch (e) {
      console.warn('Handoff request failed:', e);
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  applyLang('ar');
  setTimeout(() => { if (!isOpen) badge.style.display = 'flex'; }, 2000);
</script>
</body>
</html>
