<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>NURA Chat Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif;
      --viewport-height: 100vh;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* ── Floating button ── */
    #chat-toggle {
      position: fixed;
      bottom: 28px;
      left: 28px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #111827, #f97316);
      border: none;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(17,24,39,0.28), 0 4px 18px rgba(249,115,22,0.36);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.22s;
      z-index: 1000;
    }
    #chat-toggle:hover { transform: scale(1.08); box-shadow: 0 18px 42px rgba(17,24,39,0.32), 0 6px 24px rgba(249,115,22,0.48); }

    #badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #22c55e;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    /* ── Chat window (centered) ── */
    #chat-window {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 430px;
      max-height: 700px;
      background: #fff;
      border-radius: 22px;
      border: 1px solid rgba(17,24,39,0.08);
      box-shadow: 0 26px 78px rgba(15,23,42,0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior: contain;
      z-index: 999;
      transform: translate(-50%, -50%) scale(0.85);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
    }
    #chat-window.open {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #101827 0%, #1f2937 58%, #f97316 155%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      direction: ltr;
      position: relative;
      overflow: hidden;
    }
    .chat-header::after {
      content: "4G+";
      position: absolute;
      bottom: 8px;
      left: 58px;
      font-size: 10px;
      font-weight: 900;
      color: rgba(34,197,94,0.9);
      border: 1px solid rgba(34,197,94,0.38);
      border-radius: 999px;
      padding: 1px 6px;
      background: rgba(16,24,39,0.42);
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(249,115,22,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f97316;
      font-weight: 900;
      font-size: 13px;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .header-info { flex: 1; min-width: 0; text-align: right; }
    #chat-window[dir="ltr"] .header-info { text-align: left; }
    .header-info h3 { color: #fff; font-size: 15px; font-weight: 900; line-height: 1.2; }
    .header-info span { color: rgba(229,231,235,0.88); font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
    .online-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Language toggle */
    #lang-toggle {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.34);
      flex-shrink: 0;
      padding: 2px;
    }
    .lang-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      letter-spacing: 0.3px;
    }
    .lang-btn.active { background: rgba(255,255,255,0.95); color: #ea580c; }
    .lang-btn:hover:not(.active) { color: #fff; }

    #close-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: rgba(255,255,255,0.92);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #close-btn:hover { color: #fff; background: rgba(255,255,255,0.2); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 12px;
      background: #fbfbfc;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 86%;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-start; }
    .msg.bot   { align-self: flex-end; }
    .msg.agent { align-self: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
      unicode-bidi: plaintext;
      text-align: start;
    }
    .msg.user .bubble  { background: linear-gradient(135deg, #1f2937, #334155); color: #fff; border-bottom-right-radius: 5px; box-shadow: 0 5px 16px rgba(15,23,42,0.16); }
    .msg.bot  .bubble  { background: #fff; color: #1f2937; border: 1px solid #eef0f3; border-bottom-left-radius: 5px; box-shadow: 0 5px 18px rgba(15,23,42,0.05); }
    .msg.agent .bubble { background: #ecfdf5; color: #065f46; border: 1px solid #bbf7d0; border-bottom-left-radius: 5px; }

    /* Follow-up bubble */
    .msg.bot .followup-bubble {
      margin-top: 5px;
      padding: 8px 13px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      font-size: 13px;
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
      animation: fadeUp 0.2s ease;
    }
    .followup-btns { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-start; }
    .followup-btn {
      background: #fff;
      border: 1.5px solid #f97316;
      color: #c2410c;
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .followup-btn:hover { background: #f97316; color: #fff; }
    .followup-btn.no { border-color: #ccc; color: #888; }
    .followup-btn.no:hover { background: #f0f2f5; color: #555; }

    /* Meta */
    .meta {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.user  .meta { align-self: flex-start; }
    .msg.bot   .meta { align-self: flex-end; flex-direction: row-reverse; }
    .msg.agent .meta { align-self: flex-end; flex-direction: row-reverse; }

    .source-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .source-tag.local  { background: #dcfce7; color: #15803d; }
    .source-tag.openai { background: #e8d4f7; color: #6b1a99; }
    .source-tag.low    { background: #ffecd4; color: #b45309; }
    .source-doc-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 9.5px; color: #888; margin-top: 2px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 1px 7px;
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Typing */
    #typing {
      display: none;
      align-self: flex-end;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #eef0f3;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      animation: fadeUp 0.2s ease;
      margin: 0 16px 0;
    }
    #typing span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fb7c28;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    #typing span:nth-child(2) { animation-delay: 0.2s; }
    #typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── Tree navigation panel ── */
    #tree-panel {
      border-top: 1px solid #edf2f7;
      padding: 12px 14px 14px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      max-height: 230px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      transition: max-height 0.18s ease, padding 0.18s ease, border-color 0.18s ease, opacity 0.14s ease;
    }
    #tree-panel::-webkit-scrollbar { width: 3px; }
    #tree-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .tree-nav-bar {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
      min-height: 34px;
    }
    .tree-title {
      flex: 1;
      min-width: 0;
      color: #111827;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: start;
    }
    .tree-nav-btn {
      width: 32px;
      height: 32px;
      background: #fff;
      border: 1px solid #e5e7eb;
      color: #111827;
      border-radius: 50%;
      padding: 0;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .tree-nav-btn:hover {
      background: #fff7ed;
      color: #f97316;
      border-color: #fed7aa;
      transform: translateY(-1px);
    }
    .tree-nav-btn.home {
      font-size: 16px;
      color: #64748b;
      background: #f8fafc;
    }
    .tree-nav-btn.home:hover { background: #f1f5f9; color: #111827; border-color: #cbd5e1; }

    .tree-level-q {
      font-size: 12px;
      color: #111827;
      font-weight: 900;
      margin-bottom: 10px;
      text-align: right;
    }
    .tree-level-q.sub {
      color: #64748b;
      font-size: 11.5px;
      font-weight: 800;
      margin-top: -2px;
    }
    #chat-window[dir="ltr"] .tree-level-q { text-align: left; }

    .tree-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .tree-opt {
      background: #fff;
      border: 1px solid #e2e8f0;
      color: #1f2937;
      border-radius: 14px;
      padding: 9px 12px;
      min-height: 38px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
      white-space: normal;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-align: center;
      line-height: 1.35;
    }
    .tree-opt:hover {
      background: #fff7ed;
      border-color: #fb923c;
      color: #ea580c;
      box-shadow: 0 5px 14px rgba(234,88,12,0.08);
    }
    .tree-opt.has-children::after {
      content: ' ›';
      font-size: 13px;
      opacity: 0.6;
    }

    .agent-bypass-btn {
      margin-top: 12px;
      width: 100%;
      padding: 11px 14px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
    }
    .agent-bypass-btn:hover { background: #0f172a; border-color: #f97316; transform: translateY(-1px); }

    .voice-btn {
      margin-top: 8px;
      width: 100%;
      padding: 11px 14px;
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      color: #ea580c;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .voice-btn:hover { background: #fff7ed; border-color: #f97316; transform: translateY(-1px); }
    .voice-panel {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      line-height: 1.5;
      text-align: start;
    }
    .voice-actions { display: flex; gap: 8px; margin-top: 9px; }
    .voice-actions button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
    }
    .voice-primary { background: #ea580c; color: #fff; }
    .voice-secondary { background: #fff; color: #9a3412; border: 1px solid #fed7aa !important; }

    .suggestion-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(15,23,42,0.05);
    }
    .suggestion-card h4 {
      font-size: 13px;
      color: #111827;
      font-weight: 900;
      margin-bottom: 5px;
      text-align: start;
    }
    .suggestion-card p {
      font-size: 12px;
      color: #64748b;
      line-height: 1.55;
      margin-bottom: 10px;
      text-align: start;
    }
    .suggestion-input {
      width: 100%;
      min-height: 86px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      resize: vertical;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      color: #111827;
      outline: none;
      background: #fff;
    }
    .suggestion-input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }
    .suggestion-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    .suggestion-submit {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 9px 12px;
      background: #111827;
      color: #fff;
      font-size: 12.5px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
    }
    .suggestion-submit:disabled { opacity: 0.45; cursor: default; }
    .suggestion-cancel {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 9px 12px;
      background: #fff;
      color: #64748b;
      font-size: 12.5px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }
    .suggestion-error { margin-top: 8px; color: #be123c; font-size: 11.5px; text-align: start; }

    /* Input */
    .chat-footer {
      border-top: 1px solid #f0f2f5;
      padding: 12px 14px;
      display: flex;
      gap: 9px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #fff;
      direction: rtl;
    }
    #chat-window[dir="ltr"] .chat-footer { direction: ltr; }
    #msg-input {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      background: #fff;
      padding: 11px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: right;
    }
    #msg-input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.14); }
    #chat-window[dir="ltr"] #msg-input { text-align: left; }
    #msg-input::placeholder { color: #bbb; }

    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #22c55e);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }
    #send-btn:hover { transform: scale(1.08); }
    #send-btn:disabled { opacity: 0.38; cursor: default; transform: none; filter: grayscale(0.2); }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    #attach-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #f0f2f5;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 17px;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      color: #888;
    }
    #attach-btn:hover { background: #e0e4ea; color: #111827; }
    #attach-btn:disabled { opacity: 0.5; cursor: default; }

    .chat-img {
      max-width: 230px;
      max-height: 180px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.4);
      display: block;
      object-fit: cover;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(15,23,42,0.12);
    }

    /* Feedback */
    .feedback-btns { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
    .fb-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      color: #bbb;
      line-height: 1;
      padding: 0;
    }
    .fb-btn.good:hover  { border-color: #06d6a0; color: #06d6a0; }
    .fb-btn.bad:hover   { border-color: #ef476f; color: #ef476f; }
    .fb-btn.sel-good    { border-color: #06d6a0; color: #06d6a0; background: rgba(6,214,160,0.1); }
    .fb-btn.sel-bad     { border-color: #ef476f; color: #ef476f; background: rgba(239,71,111,0.1); }
    .fb-btn:disabled    { opacity: 0.45; cursor: default; }

    /* Escalation banner */
    .escalation-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 12.5px;
      color: #856404;
      text-align: center;
      animation: fadeUp 0.2s ease;
    }

    /* Error bubble */
    .error-bubble {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecdd3;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      align-self: flex-end;
    }

    /* Satisfaction rating */
    .rating-prompt {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      font-size: 13px;
      color: #555;
      animation: fadeUp 0.2s ease;
    }
    .rating-stars { display: flex; justify-content: center; gap: 4px; margin-top: 7px; }
    .star-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s, transform 0.1s;
      line-height: 1;
      padding: 0 2px;
    }
    .star-btn:hover { color: #f97316; transform: scale(1.15); }
    .star-btn.lit   { color: #f97316; }

    @media (max-width: 600px) {
      #chat-toggle { width: 56px; height: 56px; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 20px; }
      #chat-window {
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100vw; height: 100%; height: 100dvh; max-height: none;
        border-radius: 0; border: none;
        transform: translateY(105%);
        opacity: 1;
      }
      #chat-window.open { transform: translateY(0); }
      #chat-window.keyboard-active { height: var(--viewport-height); }
      .chat-header { padding-top: calc(16px + env(safe-area-inset-top, 0px)); border-radius: 0; }
      .chat-footer { padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px)); }
      #msg-input { font-size: 16px; }
      .msg { max-width: 92%; }
      .tree-options { grid-template-columns: 1fr; }
      #tree-panel { max-height: 260px; }

  let pageScrollY = 0;

  let previousDocumentElementStyles = {};

  function isMobileViewport() {
    return window.matchMedia ? window.matchMedia('(max-width: 600px)').matches : window.innerWidth <= 600;
  }

  function updateViewportHeight() {
    const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight || 720;
    document.body.style.setProperty('--viewport-height', h + 'px');
    if (!isMobileViewport()) setTreeCollapsedForInput(false);
    setPageScrollLocked(isOpen);
    updateKeyboardSafeMode();
    if (isOpen) scrollBottom();
  }

  function setTreeCollapsedForInput(collapsed) {
    const shouldCollapse = collapsed && isMobileViewport();
    win.classList.toggle('mobile-input-active', shouldCollapse);
    treePanel.setAttribute('aria-hidden', shouldCollapse ? 'true' : 'false');
    if ('inert' in treePanel) treePanel.inert = shouldCollapse;
    updateKeyboardSafeMode();
  }

  function updateKeyboardSafeMode() {
    const keyboardLikelyOpen = window.visualViewport
      ? window.visualViewport.height < window.innerHeight - 80
      : false;
    const shouldUseKeyboardHeight = isOpen && isMobileViewport() && document.activeElement === msgInput && keyboardLikelyOpen;
    win.classList.toggle('keyboard-active', shouldUseKeyboardHeight);
  }

  function setPageScrollLocked(locked) {
    const shouldLock = locked && isMobileViewport();
    if (shouldLock && !pageScrollLocked) {
      pageScrollY = window.scrollY || window.pageYOffset || 0;
      previousBodyStyles = {
        position: document.body.style.position,
        top: document.body.style.top,
        left: document.body.style.left,
        right: document.body.style.right,
        width: document.body.style.width,
        overflow: document.body.style.overflow,
        overscrollBehavior: document.body.style.overscrollBehavior,
      };
      previousDocumentElementStyles = {
        overflow: document.documentElement.style.overflow,
        overscrollBehavior: document.documentElement.style.overscrollBehavior,
      };
      document.documentElement.style.overflow = 'hidden';
      document.documentElement.style.overscrollBehavior = 'none';
      document.body.style.position = 'fixed';
      document.body.style.top = '-' + pageScrollY + 'px';
      document.body.style.left = '0';
      document.body.style.right = '0';
      document.body.style.width = '100%';
      document.body.style.overflow = 'hidden';
      document.body.style.overscrollBehavior = 'none';
      pageScrollLocked = true;
    } else if (!shouldLock && pageScrollLocked) {
      document.documentElement.style.overflow = previousDocumentElementStyles.overflow || '';
      document.documentElement.style.overscrollBehavior = previousDocumentElementStyles.overscrollBehavior || '';
      document.body.style.position = previousBodyStyles.position || '';
      document.body.style.top = previousBodyStyles.top || '';
      document.body.style.left = previousBodyStyles.left || '';
      document.body.style.right = previousBodyStyles.right || '';
      document.body.style.width = previousBodyStyles.width || '';
      document.body.style.overflow = previousBodyStyles.overflow || '';
      document.body.style.overscrollBehavior = previousBodyStyles.overscrollBehavior || '';
      window.scrollTo(0, pageScrollY);
      pageScrollLocked = false;
    }
  }

  updateViewportHeight();
  window.addEventListener('resize', updateViewportHeight, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateViewportHeight, { passive: true });

  // ── Tree helpers ──────────────────────────────────────────────────────────
  function treeLabel(node) {
    if (typeof node.label === 'string') return node.label;
    return node.label[currentLang] || node.label.ar;
  }

  function currentTreeNode() {
    return treeStack.length > 0 ? treeStack[treeStack.length - 1] : TOPIC_TREE;
  }

  function cleanTreeTitle(label) {
    return (label || '').replace(/^[^A-Za-z\u00C0-\u024F\u0600-\u06FF]+/, '').trim() || label;
  }

  function chooseServiceText() {
    if (currentLang === 'ar') return 'اختر الخدمة التي تحتاجها';
    if (currentLang === 'en') return 'Choose the service you need';
    return 'Xizmeta ku pêdiviya te pê heye hilbijêre';
  }

  function mergeSharedTopicLabels(sharedNode, localNode) {
    if (!sharedNode) return localNode;
    const merged = { ...sharedNode };
    if (typeof sharedNode.label === 'string') {
      merged.label = {
        ar: sharedNode.label,
        ku: TOPIC_LABELS_KU[sharedNode.id] || (localNode && localNode.label && localNode.label.ku) || sharedNode.label,
        en: TOPIC_LABELS_EN[sharedNode.id] || (localNode && localNode.label && localNode.label.en) || sharedNode.label,
      };
    }
    const localChildrenById = {};
    ((localNode && localNode.children) || []).forEach(child => { localChildrenById[child.id] = child; });
    if (sharedNode.children) {
      merged.children = sharedNode.children.map(child =>
        mergeSharedTopicLabels(child, localChildrenById[child.id])
      );
    }
    return merged;
  }

  async function loadSharedTopicTree() {
    try {
      const res = await fetch(`${API_BASE}/topic-tree`);
      if (!res.ok) return;
      const shared = await res.json();
      TOPIC_TREE = mergeSharedTopicLabels(shared, TOPIC_TREE);
      treeStack = [];
      renderTree();
    } catch (e) {
      console.warn('topic tree load failed:', e);
    }
  }

  async function directToAgent() {
    if (isEscalated) return;
    try {
      const handoffHeaders = { 'Content-Type': 'application/json' };
      if (sessionToken) handoffHeaders['X-Session-Token'] = sessionToken;
      const handoffRes = await fetch(`${API_BASE}/handoff/direct`, {
        method: 'POST',
        headers: handoffHeaders,
        body: JSON.stringify({ session_id: sessionId, customer_id: customerId, channel: 'web', reason: 'direct_request' }),
      });
      if (!handoffRes.ok) throw new Error(`Handoff failed: ${handoffRes.status}`);
      const data = await handoffRes.json();
      sessionId = data.session_id;
      sessionToken = data.session_token || sessionToken;
      isEscalated = true;
      showEscalationBanner();
      startAgentStream();
      renderTree();
    } catch (e) {
      console.warn('directToAgent failed:', e);
    }
  }

  function apiOrigin() {
    return API_BASE.replace(/\/v1\/?$/, '');
  }

  function loadLiveKitClient() {
    if (window.LivekitClient) return Promise.resolve(window.LivekitClient);
    if (livekitPromise) return livekitPromise;
    livekitPromise = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `${apiOrigin()}/vendor/livekit-client.umd.js`;
      script.async = true;
      script.onload = () => resolve(window.LivekitClient);
      script.onerror = () => reject(new Error('LiveKit client failed to load'));
      document.head.appendChild(script);
    });
    return livekitPromise;
  }

  async function requestVoiceCall() {
    const t = UI[currentLang];
    if (isSessionClosed) return;
    try {
      track('voice_call_request', 'widget', '');
      const headers = { 'Content-Type': 'application/json' };
      if (sessionToken) headers['X-Session-Token'] = sessionToken;
      const res = await fetch(`${API_BASE}/voice/request`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ session_id: sessionId, customer_id: customerId, channel: 'web' }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || t.voiceError);
      sessionId = data.session_id || sessionId;
      sessionToken = data.session_token || sessionToken;
      voiceCall = data;
      voiceStatus = 'ready';
      startAgentStream();
      renderTree();
    } catch (e) {
      const errDiv = document.createElement('div');
      errDiv.className = 'tree-level-q sub';
      errDiv.textContent = '⚠️ ' + (e.message || t.voiceError);
      treePanel.appendChild(errDiv);
    }
  }

  async function joinVoiceCall() {
    const t = UI[currentLang];
    if (!voiceCall || voiceRoom) return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      appendBotMsg('Microphone access requires a secure connection (HTTPS). Please contact support.', null, null);
      return;
    }
    voiceStatus = 'connecting';
    renderTree();
    try {
      const LK = await loadLiveKitClient();
      const room = new LK.Room({ adaptiveStream: true, dynacast: true });
      voiceRoom = room;
      room.on(LK.RoomEvent.Disconnected, () => {
        if (voiceTrack) voiceTrack.stop();
        voiceRoom = null;
        voiceTrack = null;
        voiceMuted = false;
        voiceStatus = 'ended';
        renderTree();
      });
      await room.connect(voiceCall.server_url, voiceCall.livekit_token);
      voiceTrack = await LK.createLocalAudioTrack({ echoCancellation: true, noiseSuppression: true });
      await room.localParticipant.publishTrack(voiceTrack);
      voiceMuted = false;
      voiceStatus = 'connected';
      renderTree();
    } catch (e) {
      console.warn('voice join failed:', e);
      if (voiceTrack) voiceTrack.stop();
      voiceTrack = null;
      if (voiceRoom) voiceRoom.disconnect();
      voiceRoom = null;
      voiceMuted = false;
      voiceStatus = 'error';
      appendBotMsg(t.voiceError, null, null);
      renderTree();
    }
  }

  function toggleVoiceMute() {
    if (!voiceTrack) return;
    if (voiceMuted) voiceTrack.unmute();
    else voiceTrack.mute();
    voiceMuted = !voiceMuted;
    renderTree();
  }

  async function endVoiceCallOnServer() {
    if (!voiceCall || !voiceCall.call_id) return;
    try {
      const headers = {};
      if (sessionToken) headers['X-Session-Token'] = sessionToken;
      await fetch(`${API_BASE}/voice/${encodeURIComponent(voiceCall.call_id)}/end`, {
        method: 'POST',
        headers,
        keepalive: true,
      });
    } catch (_) {}
  }

  function leaveVoiceCall(notifyServer = true) {
    if (notifyServer) endVoiceCallOnServer();
    if (voiceTrack) voiceTrack.stop();
    voiceTrack = null;
    if (voiceRoom) voiceRoom.disconnect();
    voiceRoom = null;
    voiceMuted = false;
    voiceStatus = 'ended';
    renderTree();
  }

  function renderVoicePanel() {
    if (!voiceCall) return;
    const t = UI[currentLang];
    const panel = document.createElement('div');
    panel.className = 'voice-panel';
    let statusText = t.voiceReady;
    if (voiceStatus === 'connecting') statusText = t.voiceConnecting;

    if (voiceStatus === 'error') statusText = t.voiceError;
    panel.textContent = statusText;

      leave.textContent = t.voiceLeave;

    panel.appendChild(actions);
    treePanel.appendChild(panel);
  }

  function renderTree() {
    const t    = UI[currentLang];
    const node = currentTreeNode();
    treePanel.innerHTML = '';

    // Back / home buttons (only when navigated below root)
    if (treeStack.length > 0) {
      const navBar = document.createElement('div');
      navBar.className = 'tree-nav-bar';

      const backBtn = document.createElement('button');
      backBtn.className = 'tree-nav-btn';
      backBtn.type = 'button';
      backBtn.title = t.treeBack;
      backBtn.setAttribute('aria-label', t.treeBack);
      backBtn.textContent = currentLang === 'ar' ? '›' : '‹';
      backBtn.addEventListener('click', () => {
        track('tree_back', treeLabel(treeStack[treeStack.length - 1]), '');
        treeStack.pop();
        renderTree();
      });
      navBar.appendChild(backBtn);

      const title = document.createElement('div');
      title.className = 'tree-title';
      title.textContent = cleanTreeTitle(treeLabel(node));
      navBar.appendChild(title);

      if (treeStack.length > 1) {
        const homeBtn = document.createElement('button');
        homeBtn.className = 'tree-nav-btn home';
        homeBtn.type = 'button';
        homeBtn.title = t.treeHome;
        homeBtn.setAttribute('aria-label', t.treeHome);
        homeBtn.textContent = '⌂';
        homeBtn.addEventListener('click', () => {
          track('tree_home', '', '');
          treeStack = [];
          renderTree();
        });
        navBar.appendChild(homeBtn);
      }

      treePanel.appendChild(navBar);
    }

    // Current level question
    const q = document.createElement('div');
    q.className = 'tree-level-q' + (treeStack.length > 0 ? ' sub' : '');
    q.textContent = treeStack.length > 0 ? chooseServiceText() : treeLabel(node);
    treePanel.appendChild(q);

    // Options for this level
    const optsDiv = document.createElement('div');
    optsDiv.className = 'tree-options';

    (node.children || []).forEach(child => {
      const btn = document.createElement('button');
      btn.className = 'tree-opt' + (child.children ? ' has-children' : '');
      btn.textContent = treeLabel(child);
      btn.addEventListener('click', () => {
        track('tree_click', treeLabel(child), child.id, { topic_id: child.id, article_id: child.article ?? null });
        if (child.action === 'agent') {
          track('direct_to_agent', 'tree_option', child.id);
          directToAgent();
        } else if (child.action === 'complaint') {
          track('suggestion_open', treeLabel(child), child.id);
          renderSuggestionForm(child);
        } else if (child.article !== undefined) {
          handleLeaf(child);
        } else if (child.children) {
          treeStack.push(child);
          renderTree();
        }
      });
      optsDiv.appendChild(btn);
    });

    treePanel.appendChild(optsDiv);

    if (treeStack.length === 0 && !isEscalated) {
      const voiceBtn = document.createElement('button');
      voiceBtn.className = 'voice-btn';
      voiceBtn.type = 'button';
      voiceBtn.textContent = t.voiceCall;
      voiceBtn.addEventListener('click', requestVoiceCall);
      treePanel.appendChild(voiceBtn);
    }
    renderVoicePanel();

  }

  function renderSuggestionForm(node) {
    const t = UI[currentLang];
    treePanel.innerHTML = '';

    const navBar = document.createElement('div');
    navBar.className = 'tree-nav-bar';

    const backBtn = document.createElement('button');
    backBtn.className = 'tree-nav-btn';
    backBtn.type = 'button';
    backBtn.title = t.treeBack;
    backBtn.setAttribute('aria-label', t.treeBack);
    backBtn.textContent = currentLang === 'ar' ? '›' : '‹';
    backBtn.addEventListener('click', () => {
      track('tree_back', treeLabel(node), '');
      renderTree();
    });
    navBar.appendChild(backBtn);

    const title = document.createElement('div');
    title.className = 'tree-title';
    title.textContent = t.suggestionTitle;
    navBar.appendChild(title);
    treePanel.appendChild(navBar);

    const card = document.createElement('div');
    card.className = 'suggestion-card';

    const heading = document.createElement('h4');
    heading.textContent = t.suggestionTitle;
    card.appendChild(heading);

    const intro = document.createElement('p');
    intro.textContent = t.suggestionIntro;
    card.appendChild(intro);

    const textarea = document.createElement('textarea');
    textarea.className = 'suggestion-input';
    textarea.placeholder = t.suggestionPlaceholder;
    textarea.maxLength = 5000;
    textarea.setAttribute('dir', t.dir);
    card.appendChild(textarea);

    const actions = document.createElement('div');
    actions.className = 'suggestion-actions';

    const submit = document.createElement('button');
    submit.className = 'suggestion-submit';
    submit.type = 'button';
    submit.textContent = t.suggestionSubmit;
    submit.disabled = true;

    const cancel = document.createElement('button');
    cancel.className = 'suggestion-cancel';
    cancel.type = 'button';
    cancel.textContent = t.suggestionCancel;
    cancel.addEventListener('click', renderTree);

    const error = document.createElement('div');
    error.className = 'suggestion-error';
    error.style.display = 'none';

    textarea.addEventListener('input', () => {
      submit.disabled = textarea.value.trim().length < 5;
      error.style.display = 'none';
    });

    submit.addEventListener('click', async () => {
      const message = textarea.value.trim();
      if (message.length < 5) {
        error.textContent = t.suggestionMin;
        error.style.display = 'block';
        return;
      }
      submit.disabled = true;
      cancel.disabled = true;
      submit.textContent = t.suggestionSending;
      try {
        const headers = { 'Content-Type': 'application/json' };
        if (sessionToken) headers['X-Session-Token'] = sessionToken;
        const res = await fetch(`${API_BASE}/suggestions`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            session_id: sessionId,
            customer_id: customerId,
            channel: 'web',
            kind: 'suggestion',
            message,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
        track('suggestion_submit', treeLabel(node), node.id, { message_length: String(message.length) });
        appendUserMsg(message);
        appendBotMsg(t.suggestionThanks + (data.case_number ? `\n${t.suggestionCase}: ${data.case_number}` : ''), null, null);
        treeStack = [];
        renderTree();
      } catch (e) {
        error.textContent = e.message || UI[currentLang].errorPrefix;
        error.style.display = 'block';
        submit.disabled = false;
        cancel.disabled = false;
        submit.textContent = t.suggestionSubmit;
      }
    });

    actions.appendChild(submit);
    actions.appendChild(cancel);
    card.appendChild(actions);
    card.appendChild(error);
    treePanel.appendChild(card);
    setTimeout(() => textarea.focus(), 50);
  }

  function handleLeaf(node) {
    const dict    = currentLang === 'en' ? ARTICLES_EN : (currentLang === 'ku' ? ARTICLES_KU : ARTICLES);
    const content = dict[node.article];
    if (content === undefined) return;

    // Show user's selection as a user bubble
    appendUserMsg(treeLabel(node));
    showTyping();

    setTimeout(() => {
      hideTyping();
      appendBotMsg(content, 0.97, 'rules');
      // Reset tree to root after answering
      treeStack = [];
      renderTree();
    }, 450);
  }

  // ── Language ──────────────────────────────────────────────────────────────
  function applyLang(lang) {
    currentLang = lang;
    const t = UI[lang];

    document.documentElement.setAttribute('lang', t.htmlLang);
    document.documentElement.setAttribute('dir', t.dir);
    win.setAttribute('dir', t.dir);
    msgInput.setAttribute('dir', t.dir);
    msgInput.placeholder = t.placeholder;
    headerTitle.textContent = t.headerTitle;
    headerStatus.innerHTML = '<span class="online-dot"></span> ' + t.headerStatus;

    langBtns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    sendBtn.setAttribute('aria-label', t.sendAriaLabel);
    closeBtn.setAttribute('aria-label', t.closeAriaLabel);
    toggle.setAttribute('aria-label', t.openChatAriaLabel);

    // Re-render tree in new language (reset to root on language switch)
    treeStack = [];
    renderTree();

    if (welcomed) {
      messagesEl.innerHTML = '';
      appendBotMsg(t.welcome, null, null);
    }
  }

  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.lang === currentLang) return;
      track('lang_switch', btn.dataset.lang, '');
      applyLang(btn.dataset.lang);
    });
  });

  // ── Open / close ──────────────────────────────────────────────────────────
  function openChat() {
    isOpen = true;
    win.classList.add('open');
    toggle.style.opacity = '0';
    toggle.style.transform = 'scale(0.5)';
    toggle.style.pointerEvents = 'none';
    badge.style.display = 'none';
    updateViewportHeight();
    setTimeout(() => {
      if (!isMobileViewport()) msgInput.focus();
      scrollBottom();
    }, 250);
    if (isEscalated && !isSessionClosed) startAgentStream();
  }
  function closeChat() {
    isOpen = false;
    setPageScrollLocked(false);
    setTreeCollapsedForInput(false);
    win.classList.remove('open');
    toggle.style.opacity = '1';
    toggle.style.transform = '';
    toggle.style.pointerEvents = '';
    stopAgentStream();
  }

  toggle.addEventListener('click', () => {
    track(isOpen ? 'chat_close' : 'chat_open', 'toggle_btn', '');
    isOpen ? closeChat() : openChat();
    if (!welcomed && isOpen) {
      welcomed = true;
      badge.style.display = 'none';
      setTimeout(() => appendBotMsg(UI[currentLang].welcome, null, null), 300);
    }
  });
  closeBtn.addEventListener('click', () => { track('chat_close', 'close_btn', ''); closeChat(); });

  // ── Input ──────────────────────────────────────────────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
    sendBtn.disabled = msgInput.value.trim() === '';
    if (isEscalated && !isSessionClosed && sessionId && sessionToken) {
      clearTimeout(typingDebounceTimer);
      typingDebounceTimer = setTimeout(() => {
        fetch(`${API_BASE}/session/${encodeURIComponent(sessionId)}/typing?sender=customer`,
          { method: 'POST', headers: { 'X-Session-Token': sessionToken } }).catch(() => {});
      }, 500);
    }
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  msgInput.addEventListener('focus', () => {
    setTreeCollapsedForInput(true);
    setTimeout(scrollBottom, 150);
  });
  msgInput.addEventListener('blur', () => {
    setTimeout(() => setTreeCollapsedForInput(false), 120);
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Attachment upload ──────────────────────────────────────────────────────
  const attachBtn = document.getElementById('attach-btn');
  const fileInput = document.getElementById('file-input');

  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';

    if (!sessionId || !sessionToken) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = UI[currentLang].attachFirstMessage;
      messagesEl.appendChild(errDiv);
      scrollBottom();
      return;
    }

    attachBtn.disabled = true;

    const form = new FormData();
    form.append('file', file);
    form.append('session_id', sessionId);

    try {
      const uploadRes = await fetch(
        `${API_BASE}/upload`,
        { method: 'POST', headers: { 'X-Session-Token': sessionToken }, body: form }
      );
      if (!uploadRes.ok) {
        const err = await uploadRes.json().catch(() => ({}));
        throw new Error(err.detail || `Upload error ${uploadRes.status}`);
      }
      const { url } = await uploadRes.json();
      const msgType = file.type.startsWith('image/') ? 'image' : 'file';

      // Show preview immediately in chat
      const previewDiv = document.createElement('div');
      previewDiv.className = 'msg user';
      if (msgType === 'image') {
        previewDiv.innerHTML = `<img src="${url}" class="chat-img" onclick="window.open('${url}')"><div class="meta"><span>${fmtTime()}</span></div>`;
      } else {
        previewDiv.innerHTML = `<div class="bubble">📄 <a href="${url}" target="_blank" style="color:inherit;text-decoration:underline">${escHtml(file.name)}</a></div><div class="meta"><span>${fmtTime()}</span></div>`;
      }
      messagesEl.appendChild(previewDiv);
      scrollBottom();

      // Send through message pipeline so agents see it
      await fetch(`${API_BASE}/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken || '' },
        body: JSON.stringify({
          session_id: sessionId,
          channel: 'web',
          customer_id: customerId,
          message: msgType === 'image'
            ? (currentLang === 'en' ? '[Image]' : '[صورة]')
            : (currentLang === 'en' ? `[File: ${file.name}]` : `[ملف: ${file.name}]`),
          attachment_url: url,
          message_type: msgType,
        }),
      });
    } catch (e) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = `⚠️ ${e.message}`;
      messagesEl.appendChild(errDiv);
      scrollBottom();
    } finally {
      attachBtn.disabled = false;
    }
  });

  // ── Render helpers ─────────────────────────────────────────────────────────
  function appendUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="meta"><span>${fmtTime()}</span></div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function appendBotMsg(text, confidence, source, sourceDoc) {
    const t   = UI[currentLang];
    const div = document.createElement('div');
    div.className = 'msg bot';

    const pct   = confidence != null ? Math.round(confidence * 100) + '%' : '';
    const tag   = sourceTag(source);
    const label = sourceLabel(source);

    const hasFollowUp = text.includes(t.followUpMarker);
    const mainText = hasFollowUp
      ? text.substring(0, text.lastIndexOf(t.followUpMarker)).trimEnd()
      : text;

    div.innerHTML = `
      <div class="bubble">${escHtml(mainText)}</div>
      ${sourceDoc ? `<span class="source-doc-chip" title="${escHtml(sourceDoc)}">📄 ${escHtml(sourceDoc)}</span>` : ''}
      <div class="meta">
        ${pct   ? `<span>${pct}</span>` : ''}
        ${label ? `<span class="source-tag ${tag}">${label}</span>` : ''}
        <span>${fmtTime()}</span>
      </div>`;

    if (source) {
      const fbDiv = document.createElement('div');
      fbDiv.className = 'feedback-btns';
      const btnGood = document.createElement('button');
      btnGood.className = 'fb-btn good'; btnGood.textContent = '✓';
      btnGood.title = UI[currentLang].feedbackGoodTitle;
      const btnBad  = document.createElement('button');
      btnBad.className  = 'fb-btn bad';  btnBad.textContent  = '✗';
      btnBad.title = UI[currentLang].feedbackBadTitle;
      btnGood.addEventListener('click', () => { track('feedback_good', source || '', ''); onFeedback(true,  btnGood, btnBad); });
      btnBad.addEventListener('click',  () => { track('feedback_bad',  source || '', ''); onFeedback(false, btnGood, btnBad); });
      fbDiv.appendChild(btnGood);
      fbDiv.appendChild(btnBad);
      div.appendChild(fbDiv);
    }

    messagesEl.appendChild(div);
    scrollBottom();

    if (hasFollowUp) {
      setTimeout(() => {
        const fDiv = document.createElement('div');
        fDiv.className = 'msg bot';
        fDiv.innerHTML = `
          <div class="followup-bubble">
            ${escHtml(t.followUpMarker)}
            <div class="followup-btns">
              <button class="followup-btn yes-btn">${escHtml(t.yesBtn)}</button>
              <button class="followup-btn no no-btn">${escHtml(t.noBtn)}</button>
            </div>
          </div>`;
        fDiv.querySelector('.yes-btn').addEventListener('click', () => {
          track('followup_yes', '', '');
          fDiv.querySelector('.followup-btns').remove();
          appendBotMsg(t.yesReply, null, null);
          msgInput.focus();
        });
        fDiv.querySelector('.no-btn').addEventListener('click', () => {
          track('followup_no', '', '');
          fDiv.querySelector('.followup-btns').remove();
          appendUserMsg(t.noUserText);
          showTyping();
          setTimeout(() => { hideTyping(); appendBotMsg(t.noReply, null, null); }, 800);
        });
        messagesEl.appendChild(fDiv);
        scrollBottom();
      }, 600);
    }
  }

  function appendAgentMsg(text, agentName) {
    const t   = UI[currentLang];
    const div = document.createElement('div');
    div.className = 'msg agent';
    div.innerHTML = `
      <div class="bubble">${escHtml(text)}</div>
      <div class="meta"><span>${escHtml(agentName || t.agentLabel)}</span><span>${fmtTime()}</span></div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    if (escalationBannerEl) escalationBannerEl.textContent = t.agentConnectedBanner;
  }

  function showEscalationBanner() {
    escalationBannerEl = document.createElement('div');
    escalationBannerEl.className = 'escalation-banner';
    escalationBannerEl.textContent = UI[currentLang].escalatingBanner;
    messagesEl.appendChild(escalationBannerEl);
    scrollBottom();
  }

  function sourceTag(src) {
    if (src === 'rules' || src === 'local_model') return 'local';
    if (src === 'openai') return 'openai';
    return 'low';
  }
  function sourceLabel(src) {
    if (src === 'rules')       return 'Rules';
    if (src === 'local_model') return 'ML';
    if (src === 'openai')      return 'AI';
    return null;
  }

  function showTyping()  { typingEl.style.display = 'flex'; scrollBottom(); }
  function hideTyping()  { typingEl.style.display = 'none'; }
  function scrollBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }
  function escHtml(str)  {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime() {
    const locale = currentLang === 'en' ? 'en' : (currentLang === 'ku' ? 'ku' : 'ar');
    return new Date().toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
  }

  // ── SSE streaming (agent messages pushed in real-time) ────────────────────
  async function startAgentStream() {
    if (agentEventSource || agentStreamStarting || !sessionId || !sessionToken) return;
    agentStreamStarting = true;
    try {
      const tokenRes = await fetch(`${API_BASE}/session/${encodeURIComponent(sessionId)}/stream-token`, {
        method: 'POST',
        headers: { 'X-Session-Token': sessionToken },
      });
      if (!tokenRes.ok) throw new Error(`Stream token failed: ${tokenRes.status}`);
      const tokenData = await tokenRes.json();
      const streamUrl = `${API_BASE}/session/${encodeURIComponent(sessionId)}/stream?stream_token=${encodeURIComponent(tokenData.stream_token)}`;
      agentEventSource = new EventSource(streamUrl);
      agentEventSource.onmessage = function (e) {
        try { handleStreamEvent(JSON.parse(e.data)); } catch (_) {}
      };
      agentEventSource.onerror = function () {
        agentEventSource.close();
        agentEventSource = null;
        if (!isSessionClosed && (isEscalated || voiceCall)) setTimeout(startAgentStream, 5000);
      };
    } catch (e) {
      if (!isSessionClosed && (isEscalated || voiceCall)) setTimeout(startAgentStream, 5000);
    } finally {
      agentStreamStarting = false;
    }
  }

  function stopAgentStream() {
    if (agentEventSource) { agentEventSource.close(); agentEventSource = null; }
  }

  let agentTypingTimer = null;

  function handleStreamEvent(event) {
    if (event.type === 'turn') {
      const t = event.turn;
      if (t.role === 'agent' && t.source === 'human') appendAgentMsg(t.message);
    } else if (event.type === 'typing' && event.sender === 'agent') {
      showTyping();
      clearTimeout(agentTypingTimer);
      agentTypingTimer = setTimeout(hideTyping, 3000);
    } else if (event.type === 'status' && event.status === 'RESOLVED' && !isSessionClosed) {
      isSessionClosed = true;
      stopAgentStream();
      const notice = document.createElement('div');
      notice.className = 'escalation-banner';
      notice.textContent = UI[currentLang].sessionClosed;
      messagesEl.appendChild(notice);
      showRatingPrompt();
      scrollBottom();
      msgInput.disabled = true;
      sendBtn.disabled  = true;
    } else if (event.type === 'voice_call_accepted') {
      voiceCall = { ...(voiceCall || {}), ...(event.call || {}) };
      appendBotMsg(UI[currentLang].voiceAccepted, null, null);
      renderTree();
    } else if (event.type === 'voice_call_ended') {
      leaveVoiceCall(false);
      voiceCall = null;
      renderTree();
    }
  }

  function showRatingPrompt() {
    const t = UI[currentLang];
    const ratingDiv = document.createElement('div');
    ratingDiv.className = 'rating-prompt';
    const p = document.createElement('p');
    p.textContent = t.ratePrompt;
    const starsRow = document.createElement('div');
    starsRow.className = 'rating-stars';
    [1, 2, 3, 4, 5].forEach(score => {
      const btn = document.createElement('button');
      btn.className = 'star-btn';
      btn.textContent = '★';
      btn.addEventListener('mouseenter', () => {
        starsRow.querySelectorAll('.star-btn').forEach((b, i) => b.classList.toggle('lit', i < score));
      });
      btn.addEventListener('mouseleave', () => {
        starsRow.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
      });
      btn.addEventListener('click', () => {
        starsRow.querySelectorAll('.star-btn').forEach((b, i) => { b.classList.toggle('lit', i < score); b.disabled = true; });
        fetch(`${API_BASE}/session/${encodeURIComponent(sessionId)}/rating`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken || '' },
          body: JSON.stringify({ score }),
        }).catch(() => {});
        setTimeout(() => { ratingDiv.innerHTML = `<p>${escHtml(t.rateThanks)}</p>`; }, 300);
      });
      starsRow.appendChild(btn);
    });
    ratingDiv.appendChild(p);
    ratingDiv.appendChild(starsRow);
    messagesEl.appendChild(ratingDiv);
  }

  // ── Send (free-text, goes to API) ─────────────────────────────────────────
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || sendBtn.disabled) return;

    track('send_message', text.substring(0, 100), '');
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    appendUserMsg(text);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/message`, {
        method: 'POST',
        headers: sessionToken
          ? { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken }
          : { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          channel: 'web',
          customer_id: customerId,
          message: text,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Error ${res.status}`);
      }

      const data = await res.json();
      sessionId = data.session_id;
      sessionToken = data.session_token || sessionToken;

      hideTyping();
      if (data.response) appendBotMsg(data.response, data.confidence, data.source, data.source_doc);

      if (data.escalated && !isEscalated) {
        isEscalated = true;
        showEscalationBanner();
        startAgentStream();
      }

    } catch (e) {
      hideTyping();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-bubble';
      errDiv.textContent = `⚠️ ${e.message || UI[currentLang].errorPrefix}`;
      messagesEl.appendChild(errDiv);
      scrollBottom();
    }
  }

  // ── Analytics tracking (fire-and-forget) ─────────────────────────────────
  function track(eventType, label, meta, extra) {
    fetch(`${API_BASE}/analytics/click`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({
        session_id:  sessionId,
        customer_id: customerId,
        event_type:  eventType,
        label:       label || '',
        meta:        meta  || '',
      }, extra || {})),
    }).catch(() => {}); // silent — never block UX
  }

  // ── Feedback ───────────────────────────────────────────────────────────────
  async function onFeedback(isGood, btnGood, btnBad) {
    btnGood.disabled = true;
    btnBad.disabled  = true;
    if (isGood) { btnGood.classList.add('sel-good'); return; }
    btnBad.classList.add('sel-bad');

    if (!sessionId || isEscalated) return;
    try {
      await fetch(`${API_BASE}/handoff/${sessionId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Session-Token': sessionToken || '',
        },
        body: JSON.stringify({ reason: 'bad_feedback' }),
      });
      isEscalated = true;
      showEscalationBanner();
      startAgentStream();
    } catch (e) {
      console.warn('Handoff request failed:', e);
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  applyLang('ar');
  loadSharedTopicTree();
  setTimeout(() => { if (!isOpen) badge.style.display = 'flex'; }, 2000);
</script>
