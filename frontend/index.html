<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>NURA Chat Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- Loads widget.js as an embeddable script, matching customer usage. -->
  <script>
    const widgetScript = document.createElement('script');
    widgetScript.src = './widget.js';
    widgetScript.dataset.api = '/v1';
    widgetScript.dataset.lang = 'ar';
    widgetScript.dataset.autoOpen = 'true';
    document.body.appendChild(widgetScript);
  </script>
</body>
</html>
