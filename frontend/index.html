<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعم العملاء</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wdth,wght@100,400;100,500;100,600;100,700&display=swap" rel="stylesheet">
  <style>
    .noto-sans-arabic {
      font-family: "Noto Sans Arabic", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      font-variation-settings: "wdth" 100;
    }
    body { font-family: "Noto Sans Arabic", sans-serif; font-optical-sizing: auto; font-variation-settings: "wdth" 100; }

    .chat-bubble-agent {
      background: #f1f5f9;
      border-radius: 4px 18px 18px 18px;
      border: 1px solid #e2e8f0;
    }
    .chat-bubble-customer {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border-radius: 18px 4px 18px 18px;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: typing 1.4s infinite;
      display: inline-block;
      margin: 0 2px;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    #messages { scroll-behavior: smooth; }
    .escalated-badge {
      background: #fef9c3;
      border: 1px solid #fbbf24;
      color: #92400e;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .confidence-badge {
      font-size: 0.62rem;
      color: #94a3b8;
      margin-top: 2px;
    }
    .header-gradient {
      background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
    }
    .send-btn {
      background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
    }
    .send-btn:hover {
      background: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
    }
    .focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 2px #f9731640;
      border-color: #f97316;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Config Bar -->
  <div class="w-full max-w-lg mb-3 bg-white rounded-2xl shadow-sm border border-slate-200 p-3 flex flex-col gap-2">
    <div class="flex items-center gap-2">
      <label class="text-xs text-slate-400 whitespace-nowrap">رقم العميل:</label>
      <input id="customerId" type="text" placeholder="اختياري"
        class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-1.5 focus-ring transition" />
    </div>
    <div class="flex items-center gap-2">
      <span id="healthStatus" class="text-xs text-slate-400">جاري التحقق من الخدمات...</span>
      <span class="mr-auto text-xs text-slate-300 font-mono">
        <span id="sessionIdDisplay">—</span>
      </span>
    </div>
  </div>

  <!-- Chat Window -->
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden border border-slate-200" style="height: 610px;">

    <!-- Header -->
    <div class="header-gradient text-white px-5 py-4 flex items-center gap-3">
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-base tracking-tight">RC</div>
      <div class="flex-1">
        <div class="font-bold text-base leading-tight">دعم العملاء</div>
        <div class="text-xs text-orange-100" id="agentStatus">متصل • مستعد للمساعدة</div>
      </div>
      <button onclick="resetChat()"
        class="text-xs bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg transition border border-white/20">
        محادثة جديدة
      </button>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3 bg-slate-50/50">
      <div class="flex items-end gap-2">
        <div class="w-7 h-7 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-xs font-bold flex-shrink-0">RC</div>
        <div>
          <div class="chat-bubble-agent px-4 py-2.5 text-sm text-slate-700 max-w-xs">
            أهلاً وسهلاً، شكراً لتواصلك معنا، كيف يمكنني مساعدتك اليوم؟
          </div>
        </div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div id="typingIndicator" class="hidden px-4 pb-2 flex items-end gap-2 bg-slate-50/50">
      <div class="w-7 h-7 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-xs font-bold flex-shrink-0">RC</div>
      <div class="chat-bubble-agent px-4 py-3">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

    <!-- Input -->
    <div class="border-t border-slate-100 p-3 flex gap-2 bg-white">
      <input
        id="messageInput"
        type="text"
        placeholder="اكتب رسالتك هنا..."
        class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus-ring transition text-right bg-slate-50"
        onkeydown="handleKeyDown(event)"
      />
      <button
        id="sendBtn"
        onclick="sendMessage()"
        class="send-btn text-white px-4 py-2.5 rounded-xl transition flex items-center gap-1.5 text-sm font-medium disabled:opacity-40"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        إرسال
      </button>
    </div>
  </div>

  <p class="mt-3 text-xs text-slate-400">خدمة العملاء</p>

  <script>
    const API_BASE = 'http://localhost:8000/v1';
    const API_KEY = 'nura-dev-key-change-in-production';

    let sessionId = null;
    let isLoading = false;

    function getCustomerId() {
      const input = document.getElementById('customerId').value.trim();
      return input || 'web-' + Math.random().toString(36).substr(2, 9);
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function showTyping(show) {
      document.getElementById('typingIndicator').classList.toggle('hidden', !show);
      document.getElementById('sendBtn').disabled = show;
      scrollToBottom();
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function addMessage(role, text, opts = {}) {
      const msgs = document.getElementById('messages');
      const wrapper = document.createElement('div');
      wrapper.className = 'flex items-end gap-2' + (role === 'customer' ? ' flex-row-reverse' : '');

      const avatar = document.createElement('div');
      if (role === 'agent') {
        avatar.className = 'w-7 h-7 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 text-xs font-bold flex-shrink-0';
        avatar.textContent = 'RC';
      } else {
        avatar.className = 'w-7 h-7 bg-slate-200 rounded-full flex items-center justify-center text-slate-500 text-xs font-bold flex-shrink-0';
        avatar.textContent = 'أ';
      }

      const bubbleWrap = document.createElement('div');
      bubbleWrap.className = 'flex flex-col max-w-xs';
      if (role === 'customer') bubbleWrap.classList.add('items-end');

      const bubble = document.createElement('div');
      bubble.className = role === 'agent'
        ? 'chat-bubble-agent px-4 py-2.5 text-sm text-slate-700'
        : 'chat-bubble-customer px-4 py-2.5 text-sm';
      bubble.textContent = text;
      bubbleWrap.appendChild(bubble);

      if (opts.escalated) {
        const badge = document.createElement('span');
        badge.className = 'escalated-badge mt-1';
        badge.textContent = '⚠ تم التحويل إلى موظف بشري';
        bubbleWrap.appendChild(badge);
      }

      if (opts.confidence !== undefined && role === 'agent') {
        const conf = document.createElement('div');
        conf.className = 'confidence-badge';
        conf.textContent = `دقة: ${Math.round(opts.confidence * 100)}%`;
        bubbleWrap.appendChild(conf);
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubbleWrap);
      msgs.appendChild(wrapper);
      scrollToBottom();
    }

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      isLoading = true;
      addMessage('customer', text);
      showTyping(true);

      try {
        const body = {
          session_id: sessionId,
          channel: 'web',
          customer_id: getCustomerId(),
          message: text,
        };

        const res = await fetch(`${API_BASE}/message`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        sessionId = data.session_id;
        document.getElementById('sessionIdDisplay').textContent = sessionId.split('-')[0] + '…';

        showTyping(false);
        addMessage('agent', data.response, {
          escalated: data.escalated,
          confidence: data.confidence,
        });

        if (data.escalated) {
          document.getElementById('agentStatus').textContent = '⚠ تم التحويل إلى موظف';
          document.getElementById('agentStatus').classList.add('text-yellow-200');
        }

      } catch (err) {
        showTyping(false);
        addMessage('agent', `عذراً، حدث خطأ: ${err.message}. تأكد من تشغيل Docker والـ SSH tunnel.`);
        console.error(err);
      } finally {
        isLoading = false;
        input.focus();
      }
    }

    function resetChat() {
      sessionId = null;
      document.getElementById('sessionIdDisplay').textContent = '—';
      document.getElementById('agentStatus').textContent = 'متصل • مستعد للمساعدة';
      document.getElementById('agentStatus').classList.remove('text-yellow-200');
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      addMessage('agent', 'أهلاً وسهلاً، شكراً لتواصلك معنا، كيف يمكنني مساعدتك اليوم؟');
    }

    async function checkHealth() {
      const el = document.getElementById('healthStatus');
      try {
        const res = await fetch(`${API_BASE}/health`, {
          headers: { 'Authorization': `Bearer ${API_KEY}` }
        });
        const data = await res.json();
        if (data.status === 'ok') {
          el.textContent = '✅ جميع الخدمات تعمل';
          el.className = 'text-xs text-emerald-600';
        } else {
          const down = Object.entries(data.services).filter(([,v]) => v !== 'ok').map(([k]) => k).join(', ');
          el.textContent = `⚠ مشكلة في: ${down}`;
          el.className = 'text-xs text-amber-600';
        }
      } catch {
        el.textContent = '❌ API غير متاح — تأكد من تشغيل Docker';
        el.className = 'text-xs text-red-500';
      }
    }

    checkHealth();
    document.getElementById('messageInput').focus();
  </script>
</body>
</html>
